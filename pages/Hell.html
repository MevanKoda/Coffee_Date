<html>

<head>
    <title>ASK</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/Animations.css">
    <script src="../js/Animations.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>


</head>



<body data-animation="auto">
    <div class="wrapper">
        <div class="box">
            <div class="image-container">
                <img src="../images/Hell.gif" alt="Hello-gif-image">
            </div>
            <h1>Welcome To Hell😈👻</h1>
            <div class="button-container">
            <button onclick = "window.location.href='../'">I WANT TO GO BACK</button>
            <button onclick = "showAlert('Da Hell?',`You can't stay here idiot😠 Go Back😤`)">I'LL STAY</button>

            </div>
        </div>
    </div>


    <script>

        //Alert Box
        function showAlert(title, message){
            Swal.fire({
                title:title,
                text:message,
                icon:'error',
                confirmButtonColor:"#f9607a"
            })
        }
    </script>
</body>

</html>
